site_name: Informatica Intelligent Data Management Cloud (IDMC)

site_description: Complete Open Source IDMC Course Repository

site_author: Hidam Rameshwar Singh

repo_url: https://github.com/<your-github-username>/IDMC-Course-Design

theme:
  name: material

  palette:
    - scheme: default
      primary: blue
      accent: blue

    - scheme: slate
      primary: blue
      accent: blue

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md